name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (libs + artifacts)
        run: pnpm run typecheck

      - name: Unit tests (api-server, no DB — integration tests self-skip)
        run: pnpm --filter @workspace/api-server run test

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: grafik_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/grafik_bot_test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Load schema + migrations into the test database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d grafik_bot_test -v ON_ERROR_STOP=1 -f deploy/schema.sql
          for m in deploy/migrations/*.sql; do
            echo "-- applying $m"
            psql -h localhost -U postgres -d grafik_bot_test -f "$m"
          done

      - name: Integration tests (api-server + Postgres)
        run: pnpm --filter @workspace/api-server run test
